<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Collective — Event Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#07070e;--surface:rgba(255,255,255,0.032);--border:rgba(255,255,255,0.07);
  --blue:#4f7fff;--red:#d94f2b;--green:#3ecf8e;--text:#e2e2ee;--muted:rgba(180,180,210,0.5);--r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Syne',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;padding:0 1.5rem 8rem;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 15% 35%,rgba(30,60,220,0.38) 0%,transparent 60%),
    radial-gradient(ellipse 60% 55% at 88% 60%,rgba(180,40,10,0.42) 0%,transparent 60%),
    radial-gradient(ellipse 40% 35% at 50% 95%,rgba(100,15,0,0.3) 0%,transparent 55%),var(--bg);
  z-index:0;pointer-events:none;
}
body>*{position:relative;z-index:1}
header{text-align:center;padding:5rem 0 3.5rem;animation:fadeDown .8s ease both}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.brand{font-family:'Instrument Serif',serif;font-size:clamp(2.8rem,6.5vw,4.8rem);font-weight:400;letter-spacing:.04em;color:#fff;line-height:1;margin-bottom:.55rem}
.brand em{font-style:italic;color:rgba(255,255,255,0.55)}
.tagline{font-family:'JetBrains Mono',monospace;font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:300}
.upload-wrap{width:100%;max-width:580px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:1.2rem;animation:fadeUp .9s .15s ease both}
.drop-zone{width:100%;border:1px dashed rgba(79,127,255,0.3);border-radius:20px;padding:2.8rem 2rem;text-align:center;background:rgba(79,127,255,0.04);cursor:pointer;transition:border-color .25s,background .25s,transform .2s;backdrop-filter:blur(10px)}
.drop-zone:hover,.drop-zone.over{border-color:rgba(79,127,255,0.6);background:rgba(79,127,255,0.08);transform:translateY(-2px)}
.dz-icon{font-size:1.8rem;margin-bottom:.75rem;opacity:.45}
.dz-main{font-size:.93rem;color:rgba(200,200,240,.72);margin-bottom:.25rem}
.dz-sub{font-size:.77rem;color:var(--muted)}
.dz-sub span{color:var(--blue);text-decoration:underline;text-underline-offset:3px;cursor:pointer}
#file-status{margin-top:.65rem;font-size:.78rem;min-height:1rem;color:var(--green);font-family:'JetBrains Mono',monospace}
#csv-file{display:none}
.gen-btn{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;border:none;border-radius:12px;padding:.95rem 2.5rem;width:100%;max-width:400px;cursor:pointer;background:linear-gradient(135deg,#1e3eb5 0%,#a03018 100%);box-shadow:0 0 40px rgba(50,90,220,0.18),0 0 40px rgba(160,48,24,0.14);transition:transform .2s,box-shadow .2s,opacity .2s}
.gen-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 60px rgba(79,127,255,0.3),0 0 60px rgba(200,60,30,0.22)}
.gen-btn:disabled{opacity:.22;cursor:not-allowed}
#loading{display:none;text-align:center;padding:.5rem}
.spinner{width:26px;height:26px;border:2px solid rgba(79,127,255,0.15);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .65rem}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);letter-spacing:.1em}
#error-box{display:none;background:rgba(180,30,30,.12);border:1px solid rgba(220,70,70,.28);border-radius:12px;padding:1rem 1.25rem;color:#ff9999;font-size:.84rem;line-height:1.7;width:100%;max-width:580px}
#results{display:none;width:100%;max-width:1000px;margin-top:5rem;animation:fadeUp .6s ease both}
.sec-head{display:flex;align-items:center;gap:.75rem;margin:3.5rem 0 1.3rem}
.sec-num{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:.18rem .45rem;letter-spacing:.1em}
.sec-title{font-family:'Instrument Serif',serif;font-size:1.65rem;font-weight:400;color:#fff}
.sec-line{flex:1;height:1px;background:var(--border)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.75rem}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.35rem 1rem 1.15rem;text-align:center;backdrop-filter:blur(6px);transition:border-color .2s,transform .2s}
.metric:hover{border-color:rgba(79,127,255,0.22);transform:translateY(-2px)}
.metric-val{font-family:'Instrument Serif',serif;font-size:2.3rem;font-weight:400;line-height:1;background:linear-gradient(110deg,#a0baff,#ffb87a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.metric-lbl{font-family:'JetBrains Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-top:.35rem}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:.9rem}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.4rem 1.2rem;backdrop-filter:blur(6px)}
.chart-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:1rem}
.chart-wrap{position:relative;height:190px;display:flex;align-items:center;justify-content:center}
.sat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.75rem;backdrop-filter:blur(6px)}
.sat-top{display:flex;align-items:baseline;gap:.75rem;margin-bottom:1.2rem}
.sat-score{font-family:'Instrument Serif',serif;font-size:3rem;color:#a0baff;line-height:1}
.sat-denom{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--muted)}
.sat-desc{font-size:.82rem;color:rgba(200,200,235,.65);margin-left:auto;text-align:right;max-width:200px;line-height:1.5}
.bar-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.4rem}
.bar-key{font-size:.78rem;color:rgba(190,190,220,.75);min-width:90px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#3355cc,#cc4400);transition:width 1s ease}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);min-width:28px;text-align:right}
.qual-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem 1.75rem;backdrop-filter:blur(6px)}
.themes-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.4rem}
.theme-chip{display:inline-flex;align-items:center;gap:.4rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:.35rem .75rem;border-radius:99px;border:1px solid rgba(79,127,255,0.25);background:rgba(79,127,255,0.08);color:rgba(200,210,255,.85);transition:border-color .2s,background .2s;cursor:default}
.theme-chip:hover{border-color:rgba(79,127,255,0.5);background:rgba(79,127,255,0.14)}
.theme-chip .chip-count{background:rgba(79,127,255,0.25);border-radius:99px;padding:.1rem .4rem;font-size:.65rem;color:#a0baff}
.theme-chip.neg{border-color:rgba(217,79,43,0.25);background:rgba(217,79,43,0.07);color:rgba(255,200,185,.8)}
.theme-chip.neg .chip-count{background:rgba(217,79,43,0.2);color:#ffaa88}
.qual-divider{display:flex;align-items:center;gap:.7rem;margin:1.25rem 0 1rem}
.qual-divider span{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);white-space:nowrap}
.qual-divider::before,.qual-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.recs-grid{display:flex;flex-direction:column;gap:.7rem}
.rec{display:flex;gap:.9rem;padding:1rem 1.2rem;background:rgba(25,55,185,0.07);border:1px solid rgba(70,100,255,0.12);border-radius:12px;align-items:flex-start;transition:border-color .2s,background .2s}
.rec:hover{border-color:rgba(70,100,255,0.25);background:rgba(25,55,185,0.12)}
.rec-n{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1e44cc,#991800);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;color:#fff;margin-top:1px}
.rec-t{font-size:.87rem;color:rgba(205,205,235,.85);line-height:1.65}
</style>
</head>
<body>
<header>
  <div class="brand">AI <em>Collective</em></div>
  <div class="tagline">Event Intelligence Platform</div>
</header>
<div class="upload-wrap">
  <div class="drop-zone" id="drop-zone">
    <div class="dz-icon">📋</div>
    <p class="dz-main">Drop your CSV file here</p>
    <p class="dz-sub">or <span id="browse-trigger">click to browse</span> your files</p>
    <div id="file-status"></div>
  </div>
  <input type="file" id="csv-file" accept=".csv,text/csv"/>
  <button class="gen-btn" id="gen-btn" disabled>Generate Analysis</button>
  <div id="loading"><div class="spinner"></div><p>Analyzing event data…</p></div>
  <div id="error-box"></div>
</div>
<div id="results">
  <div class="sec-head"><span class="sec-num">01</span><span class="sec-title">Overview</span><div class="sec-line"></div></div>
  <div class="metrics" id="metrics"></div>
  <div class="sec-head"><span class="sec-num">02</span><span class="sec-title">Who Participates</span><div class="sec-line"></div></div>
  <div class="chart-grid" id="who-charts"></div>
  <div class="sec-head"><span class="sec-num">03</span><span class="sec-title">Engagement &amp; Satisfaction</span><div class="sec-line"></div></div>
  <div id="sat-section"></div>
  <div class="sec-head"><span class="sec-num">04</span><span class="sec-title">Qualitative Insights</span><div class="sec-line"></div></div>
  <div class="qual-card" id="qual-section"><p style="color:var(--muted);font-size:.85rem">AI analysis will appear here after generation.</p></div>
</div>
<script>
const dropZone=document.getElementById('drop-zone'),browseTrig=document.getElementById('browse-trigger'),csvFile=document.getElementById('csv-file'),fileStatus=document.getElementById('file-status'),genBtn=document.getElementById('gen-btn'),loadingEl=document.getElementById('loading'),errorBox=document.getElementById('error-box'),resultsEl=document.getElementById('results');
let parsedRows=[],rawCSV='';
const chartInstances={};
dropZone.addEventListener('click',()=>csvFile.click());
browseTrig.addEventListener('click',e=>{e.stopPropagation();csvFile.click();});
csvFile.addEventListener('change',function(){if(this.files[0])handleFile(this.files[0]);});
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
function handleFile(file){
  hideError();fileStatus.textContent='';genBtn.disabled=true;
  const reader=new FileReader();
  reader.onload=e=>{
    rawCSV=e.target.result;
    try{parsedRows=parseCSV(rawCSV);if(parsedRows.length===0)throw new Error('No data rows found.');
      fileStatus.textContent='✓  '+file.name+'  ('+parsedRows.length+' responses)';genBtn.disabled=false;
    }catch(err){showError('Could not parse CSV: '+err.message);}
  };
  reader.onerror=()=>showError('File could not be read.');
  reader.readAsText(file,'UTF-8');
}
function parseCSV(text){
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows=[];let cur='',inQ=false,fields=[];
  // detect delimiter: tab or comma
  const firstLine=text.split('\n')[0];
  const delim=firstLine.split('\t').length>firstLine.split(',').length?'\t':',';
  for(let i=0;i<=text.length;i++){
    const ch=text[i];
    if(ch===undefined){fields.push(cur.trim());rows.push(fields);break;}
    if(ch==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===delim&&!inQ){fields.push(cur.trim());cur='';}
    else if(ch==='\n'&&!inQ){fields.push(cur.trim());rows.push(fields);fields=[];cur='';}
    else cur+=ch;
  }
  if(rows.length<2)throw new Error('File appears empty or has only a header row.');
  const headers=rows[0].map(h=>h.replace(/^"|"$/g,'').trim());
  const data=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(r.every(v=>v===''))continue;
    const obj={};headers.forEach((h,j)=>{obj[h]=(r[j]||'').replace(/^"|"$/g,'').trim();});
    data.push(obj);
  }
  return data;
}
function detectCols(rows){
  const keys=Object.keys(rows[0]);
  const find=re=>keys.find(k=>re.test(k))||null;
  return{
    year:find(/^year$/i),
    major:find(/major/i),
    involvement:find(/involvement|role/i),
    skill:find(/skill/i),
    satisfaction:find(/satisfi|satisfaction|how satisfied/i),
    enjoyed:find(/enjoy|like|what did you enjoy|went well/i),
    improve:find(/improv|suggest|could be|what.*could/i),
    heard:find(/hear about|heard about/i),
  };
}
function computeStats(rows){
  const cols=detectCols(rows);
  function countField(key){if(!key)return{};const t={};rows.forEach(r=>{const v=r[key];if(v)t[v]=(t[v]||0)+1;});return t;}
  const scores=cols.satisfaction?rows.map(r=>parseFloat(r[cols.satisfaction])).filter(n=>!isNaN(n)):[];
  const avgSat=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:null;
  const medSat=scores.length?median(scores):null;
  const dist={low:0,mid:0,high:0};
  scores.forEach(s=>{if(s<=5)dist.low++;else if(s<=7)dist.mid++;else dist.high++;});
  return{
    total:rows.length,cols,scores,avgSat,medSat,dist,
    yearDist:countField(cols.year),majorDist:countField(cols.major),
    involveDist:countField(cols.involvement),skillDist:countField(cols.skill),heardDist:countField(cols.heard),
    enjoyMentions:cols.enjoyed?rows.map(r=>(r[cols.enjoyed]||'').trim()).filter(Boolean):[],
    improveMentions:cols.improve?rows.map(r=>(r[cols.improve]||'').trim()).filter(Boolean):[],
  };
}
function median(arr){const s=[...arr].sort((a,b)=>a-b),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function topN(obj,n=8){return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);}
function pct(v,total){return total?Math.round(v/total*100):0;}
const PIE_COLORS=['rgba(79,127,255,0.8)','rgba(217,79,43,0.8)','rgba(201,153,58,0.8)','rgba(62,207,142,0.8)','rgba(160,100,255,0.8)','rgba(255,160,60,0.8)','rgba(80,200,220,0.8)','rgba(255,100,130,0.8)'];
function makePie(id,labels,data){
  if(chartInstances[id])chartInstances[id].destroy();
  const ctx=document.getElementById(id);if(!ctx)return;
  chartInstances[id]=new Chart(ctx.getContext('2d'),{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:PIE_COLORS,borderColor:PIE_COLORS.map(c=>c.replace('0.8','1')),borderWidth:1.5,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{
        legend:{position:'right',labels:{color:'rgba(180,180,210,0.75)',font:{family:"'JetBrains Mono',monospace",size:10},boxWidth:10,padding:10,
          generateLabels:function(chart){const ds=chart.data.datasets[0];const total=ds.data.reduce((a,b)=>a+b,0);
            return chart.data.labels.map((label,i)=>({text:(label.length>16?label.slice(0,15)+'…':label)+' ('+Math.round(ds.data[i]/total*100)+'%)',fillStyle:ds.backgroundColor[i],strokeStyle:ds.backgroundColor[i],lineWidth:1,hidden:false,index:i}));}}},
        tooltip:{callbacks:{label:ctx=>{const total=ctx.dataset.data.reduce((a,b)=>a+b,0);return ' '+ctx.label+': '+ctx.parsed+' ('+Math.round(ctx.parsed/total*100)+'%)';}}}
      }
    }
  });
}
function renderStats(st){
  const highPct=st.scores.length?pct(st.dist.high,st.scores.length)+'%':'—';
  document.getElementById('metrics').innerHTML=[
    {val:st.total,lbl:'Total Responses'},
    {val:st.avgSat?st.avgSat.toFixed(1)+'/10':'—',lbl:'Avg Satisfaction'},
    {val:st.medSat?st.medSat.toFixed(1)+'/10':'—',lbl:'Median Score'},
    {val:highPct,lbl:'Rated 8–10'},
  ].map(m=>'<div class="metric"><div class="metric-val">'+m.val+'</div><div class="metric-lbl">'+m.lbl+'</div></div>').join('');

  const whoEl=document.getElementById('who-charts');whoEl.innerHTML='';
  function addPie(title,distObj,id){
    const entries=topN(distObj,8);if(!entries.length)return;
    const card=document.createElement('div');card.className='chart-card';
    card.innerHTML='<div class="chart-label">'+title+'</div><div class="chart-wrap"><canvas id="'+id+'"></canvas></div>';
    whoEl.appendChild(card);setTimeout(()=>makePie(id,entries.map(e=>e[0]),entries.map(e=>e[1])),80);
  }
  addPie('Year of Study',st.yearDist,'pie-year');
  addPie('AISC Involvement',st.involveDist,'pie-involve');
  addPie('Technical Skill',st.skillDist,'pie-skill');
  addPie('Major Distribution',st.majorDist,'pie-major');
  addPie('How They Heard',st.heardDist,'pie-heard');
  if(!whoEl.children.length)whoEl.innerHTML='<p style="color:var(--muted);font-size:.85rem;padding:.5rem 0">No demographic columns detected in this CSV.</p>';

  const satEl=document.getElementById('sat-section');
  if(st.scores.length){
    const total=st.scores.length;
    satEl.innerHTML='<div class="sat-card"><div class="sat-top"><div class="sat-score">'+st.avgSat.toFixed(1)+'</div><div class="sat-denom">/ 10 avg</div><div class="sat-desc">Based on '+total+' response'+(total!==1?'s':'')+' · median '+st.medSat.toFixed(1)+'</div></div>'+
      [{lbl:'High (8–10)',val:st.dist.high},{lbl:'Mid  (6–7)',val:st.dist.mid},{lbl:'Low  (1–5)',val:st.dist.low}].map(b=>
        '<div class="bar-row"><div class="bar-key">'+b.lbl+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct(b.val,total)+'%"></div></div><div class="bar-val">'+pct(b.val,total)+'%</div></div>'
      ).join('')+'</div>';
  } else {
    satEl.innerHTML='<p style="color:var(--muted);font-size:.85rem;padding:.5rem 0">No satisfaction score column detected in this CSV.</p>';
  }
}
genBtn.addEventListener('click',async()=>{
  if(!rawCSV||parsedRows.length===0)return;
  hideError();resultsEl.style.display='none';loadingEl.style.display='block';genBtn.disabled=true;
  try{
    const st=computeStats(parsedRows);renderStats(st);
    const statsLines=['Total responses: '+st.total];
    if(st.avgSat!==null)statsLines.push('Avg satisfaction: '+st.avgSat.toFixed(2)+'/10 (median '+st.medSat.toFixed(1)+')');
    if(Object.keys(st.yearDist).length)statsLines.push('Year: '+Object.entries(st.yearDist).map(([k,v])=>k+':'+v).join(', '));
    if(Object.keys(st.involveDist).length)statsLines.push('Involvement: '+Object.entries(st.involveDist).map(([k,v])=>k+':'+v).join(', '));
    if(Object.keys(st.skillDist).length)statsLines.push('Skill level: '+Object.entries(st.skillDist).map(([k,v])=>k+':'+v).join(', '));
    if(Object.keys(st.heardDist).length)statsLines.push('How heard: '+topN(st.heardDist,5).map(([k,v])=>k+':'+v).join(', '));
    const prompt='You are an event analyst for AI Collective (AISC), a university AI club. Analyze this post-event feedback and return ONLY valid JSON — no markdown, no preamble.\n\nQUANTITATIVE SUMMARY:\n'+statsLines.join('\n')+'\n\nOPEN-ENDED RESPONSES:\nWhat people enjoyed: '+st.enjoyMentions.join(' | ')+'\nWhat could be improved: '+st.improveMentions.join(' | ')+'\n\nReturn EXACTLY this JSON:\n{\n  "enjoyed_themes": [\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"}\n  ],\n  "improve_themes": [\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"},\n    {"label":"max 4 words","count":number,"emoji":"emoji"}\n  ],\n  "recommendations": [\n    "Specific actionable rec 1 tied directly to feedback",\n    "Specific actionable rec 2",\n    "Specific actionable rec 3",\n    "Specific actionable rec 4",\n    "Specific actionable rec 5"\n  ]\n}\nLabels max 4 words. Count = frequency in responses. Recs must be concrete and grounded in actual feedback.';
    const resp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error: status '+resp.status);}
    const data=await resp.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('');
    const clean=raw.replace(/```json\s*/g,'').replace(/```/g,'').trim();
    const parsed=JSON.parse(clean);
    const qualEl=document.getElementById('qual-section');
    const enjoyChips=(parsed.enjoyed_themes||[]).map(t=>'<span class="theme-chip">'+t.emoji+' '+t.label+' <span class="chip-count">'+t.count+'x</span></span>').join('');
    const improveChips=(parsed.improve_themes||[]).map(t=>'<span class="theme-chip neg">'+t.emoji+' '+t.label+' <span class="chip-count">'+t.count+'x</span></span>').join('');
    const recsHTML=(parsed.recommendations||[]).map((r,i)=>'<div class="rec"><div class="rec-n">'+(i+1)+'</div><div class="rec-t">'+r+'</div></div>').join('');
    qualEl.innerHTML='<div class="chart-label" style="margin-bottom:.75rem">What went well</div><div class="themes-row">'+(enjoyChips||'<span style="color:var(--muted);font-size:.82rem">No enjoy responses found</span>')+'</div><div class="qual-divider"><span>Areas to improve</span></div><div class="themes-row">'+(improveChips||'<span style="color:var(--muted);font-size:.82rem">No improvement responses found</span>')+'</div><div class="qual-divider"><span>Recommendations</span></div><div class="recs-grid">'+recsHTML+'</div>';
    loadingEl.style.display='none';resultsEl.style.display='block';genBtn.disabled=false;
    resultsEl.scrollIntoView({behavior:'smooth',block:'start'});
  }catch(err){loadingEl.style.display='none';genBtn.disabled=false;showError('Error: '+(err.message||'Something went wrong.'));}
});
function showError(msg){errorBox.innerHTML=msg;errorBox.style.display='block';}
function hideError(){errorBox.style.display='none';errorBox.innerHTML='';}
</script>
</body>
</html>
